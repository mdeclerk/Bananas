name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image (bananas-buildenv)
        run: bash scripts/init.sh

      - name: Compile ROM
        run: bash scripts/build.sh

      - name: Verify ROM
        run: |
          test -s build/bananas.gb
          # Nintendo logo magic byte at 0x0104 — proves cart header is well-formed
          xxd -s 0x104 -l 1 build/bananas.gb | grep -q "ce"

      - uses: actions/upload-artifact@v5
        with:
          name: bananas-gb
          path: build/bananas.gb

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: bananas-gb
          path: build

      - name: Publish rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest build/bananas.gb \
            --title "Latest build" \
            --notes "Built from commit ${GITHUB_SHA::7} on $(date -u +%Y-%m-%d)"
