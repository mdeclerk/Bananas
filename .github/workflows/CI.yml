name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard-main:
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "workflow_dispatch is only allowed on main; got ${GITHUB_REF}"
            exit 1
          fi

  build-buildenv:
    needs: guard-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: bash scripts/init.sh

      - name: Archive Docker image
        run: |
          set -euo pipefail
          docker save bananas-buildenv | gzip > /tmp/bananas-buildenv.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: bananas-buildenv
          path: /tmp/bananas-buildenv.tar.gz
          retention-days: 1

  build-release:
    needs: build-buildenv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: bananas-buildenv
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/bananas-buildenv.tar.gz

      - name: Compile ROM
        run: bash scripts/build.sh

      - name: Verify ROM
        run: |
          test -s build/bananas.gb
          # Nintendo logo magic byte at 0x0104 — proves cart header is well-formed
          xxd -s 0x104 -l 1 build/bananas.gb | grep -q "ce"

      - uses: actions/upload-artifact@v7
        with:
          name: bananas-release
          path: build/bananas.gb

  build-debug:
    needs: build-buildenv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: bananas-buildenv
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/bananas-buildenv.tar.gz

      - name: Compile debug ROM
        run: bash scripts/build.sh DEBUG=1

      - name: Verify debug artifacts
        run: |
          test -s build/bananas.gb
          test -s build/bananas.sym
          test -s build/bananas.map
          test -s build/bananas.noi

      - uses: actions/upload-artifact@v7
        with:
          name: bananas-debug
          path: |
            build/bananas.gb
            build/bananas.sym
            build/bananas.map
            build/bananas.noi

  build-pybananas:
    needs: build-buildenv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: bananas-buildenv
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/bananas-buildenv.tar.gz

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          manifest-path: PyBananas/pyproject.toml
          cache: true

      - name: Build wheel
        working-directory: PyBananas
        run: pixi run build-wheel

      - name: Run tests
        working-directory: PyBananas
        run: pixi run test

      - name: Verify wheel bundles ROM
        run: |
          set -euo pipefail
          wheel=$(ls PyBananas/dist/pybananas-*.whl | head -n1)
          unzip -l "$wheel" | grep -q "pybananas/rom/bananas.gb"
          unzip -l "$wheel" | grep -q "pybananas/rom/bananas.sym"

      - uses: actions/upload-artifact@v7
        with:
          name: pybananas-wheel
          path: PyBananas/dist/*

  publish:
    needs: [build-release, build-debug, build-pybananas]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: bananas-release
          path: build/release

      - uses: actions/download-artifact@v8
        with:
          name: bananas-debug
          path: build/debug

      - uses: actions/download-artifact@v8
        with:
          name: pybananas-wheel
          path: build/pybananas

      - name: Package artifacts
        run: |
          zip bananas-release.zip -j build/release/*
          zip bananas-debug.zip -j build/debug/*

      - name: Publish rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            bananas-release.zip \
            bananas-debug.zip \
            build/pybananas/* \
            --title "Latest build" \
            --notes "Built from commit ${GITHUB_SHA::7} on $(date -u +%Y-%m-%d)"
